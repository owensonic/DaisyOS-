<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DaisyObjects – Real AR Detection & Hunting</title>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <!-- TensorFlow.js and COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <!-- Tesseract.js for OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0f1e;
      color: #eef2ff;
      overflow-x: hidden;
    }
    :root { --neon: #00f5c0; }
    .container { max-width: 1000px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge {
      background: rgba(0,245,192,0.1);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      border: 1px solid rgba(0,245,192,0.3);
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 40px;
      color: var(--neon);
    }
    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(10,15,30,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,245,192,0.3);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 0.7rem;
      gap: 4px;
      cursor: pointer;
    }
    .nav-item.active { color: var(--neon); }
    .nav-icon { font-size: 1.5rem; }
    .card {
      background: rgba(15,23,42,0.6);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(0,245,192,0.2);
    }
    .video-container {
      position: relative;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    #videoFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0;
      justify-content: center;
    }
    button {
      background: rgba(0,245,192,0.2);
      border: 1px solid var(--neon);
      padding: 8px 16px;
      border-radius: 40px;
      color: var(--neon);
      cursor: pointer;
    }
    .nft-banner {
      background: linear-gradient(135deg, #00f5c0, #0a8f6e);
      color: #0a0f1e;
      padding: 10px;
      border-radius: 20px;
      text-align: center;
      margin: 16px 0;
      font-weight: bold;
    }
    .admin-section {
      background: rgba(255,100,0,0.15);
      border-left: 4px solid #ff6600;
      padding: 12px;
      border-radius: 16px;
      margin-top: 16px;
    }
    footer {
      margin-top: 40px;
      padding: 20px 0;
      text-align: center;
      font-size: 0.7rem;
      border-top: 1px solid rgba(0,245,192,0.2);
    }
    #statusMsg {
      background: #000000aa;
      padding: 8px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 12px;
    }
    @media (max-width: 640px) {
      .container { padding: 12px; }
    }
  </style>
</head>
<body>
<div class="container" id="appContainer">
  <div class="header">
    <h2>🔍 DaisyObjects</h2>
    <div class="badge-row">
      <span class="badge">🎯 Real AI Detection</span>
      <span class="badge">🪪 License Plate OCR</span>
      <span class="badge">🏹 Hunting Addon</span>
      <div id="userWidget"></div>
      <button class="icon-btn" id="settingsBtn">⚙️</button>
    </div>
  </div>
  <div id="screenContent"></div>
  <footer>
    <a href="https://owensonicinfinity.netlify.app" target="_blank">OwenSonicInfinity.netlify.app</a> | 
    <a href="https://owensonicinfinity.github.io" target="_blank">OwenSonicInfinity.github.io</a><br>
    Cleveland, Ohio 44089 | owensonicinfinity@gmail.com<br>
    © 2026 Douglas Owens Jr. All rights reserved.
  </footer>
</div>

<div class="nav-bar">
  <button class="nav-item" data-nav="home"><span class="nav-icon">🏠</span><span>Home</span></button>
  <button class="nav-item" data-nav="detect"><span class="nav-icon">🎯</span><span>Detect</span></button>
  <button class="nav-item" data-nav="hunt"><span class="nav-icon">🏹</span><span>Hunt</span></button>
  <button class="nav-item" data-nav="profile"><span class="nav-icon">👤</span><span>Profile</span></button>
</div>

<script>
  // ==================== Firebase & Global State ====================
  const firebaseConfig = {
    apiKey: "AIzaSyDummyKeyForDemoOnly",
    authDomain: "daisyos-demo.firebaseapp.com",
    projectId: "daisyos-demo",
  };
  let auth;
  try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
  } catch(e) { console.warn("Firebase init failed, using mock auth"); }

  let currentUser = null;
  let currentScreen = 'home';
  let geminiApiKey = localStorage.getItem("geminiApiKey") || "";
  let customBgImage = localStorage.getItem("customBgImage") || "";
  let walletBalance = parseFloat(localStorage.getItem("walletBalance")) || 5.0;
  let userNFTs = JSON.parse(localStorage.getItem("userNFTs")) || [];
  let huntingLogs = JSON.parse(localStorage.getItem("huntingLogs")) || [];

  // AR detection variables
  let model = null;
  let videoStream = null;
  let videoElement = null;
  let canvasElement = null;
  let ctx = null;
  let animationId = null;
  let currentFacingMode = 'environment'; // rear camera
  let nightVision = false;
  let ocrActive = false;
  let lastObjects = []; // store for predictive movement

  // Admin detection
  function isAdmin() {
    if (!currentUser) return false;
    const email = (currentUser.email || "").toLowerCase();
    const name = (currentUser.displayName || "").toLowerCase();
    return email === "owensonicinfinity@gmail.com" || name.includes("douglas") || name.includes("doug");
  }

  function applyBackground() {
    if (customBgImage && customBgImage.trim()) {
      document.body.style.background = `url('${customBgImage}') center/cover fixed`;
    } else {
      document.body.style.background = "";
      document.body.style.backgroundColor = "#0a0f1e";
    }
  }

  // ==================== TensorFlow.js COCO-SSD Initialization ====================
  async function loadModel() {
    const statusDiv = document.getElementById("modelStatus");
    if (statusDiv) statusDiv.innerText = "Loading AI model (20MB)... please wait";
    try {
      model = await cocoSsd.load();
      if (statusDiv) statusDiv.innerText = "✅ AI model ready. Point camera at objects.";
      return true;
    } catch(e) {
      if (statusDiv) statusDiv.innerText = "❌ Model load failed: " + e.message;
      return false;
    }
  }

  // ==================== Camera Setup ====================
  async function startCamera() {
    if (videoStream) {
      videoStream.getTracks().forEach(track => track.stop());
    }
    const constraints = {
      video: { facingMode: { exact: currentFacingMode } }
    };
    try {
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      videoStream = stream;
      if (!videoElement) videoElement = document.getElementById("videoFeed");
      if (videoElement) {
        videoElement.srcObject = stream;
        await videoElement.play();
      }
      return true;
    } catch(err) {
      // fallback to any camera
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        videoStream = stream;
        if (videoElement) {
          videoElement.srcObject = stream;
          await videoElement.play();
        }
        return true;
      } catch(e) {
        alert("Camera error: " + e.message);
        return false;
      }
    }
  }

  function switchCamera() {
    currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  }

  function toggleNightVision() {
    nightVision = !nightVision;
    if (videoElement) {
      videoElement.style.filter = nightVision ? "brightness(1.2) contrast(2) hue-rotate(90deg)" : "none";
    }
  }

  // ==================== Real-time Object Detection ====================
  async function detectFrame() {
    if (!model || !videoElement || videoElement.readyState !== 4) {
      requestAnimationFrame(detectFrame);
      return;
    }
    try {
      const predictions = await model.detect(videoElement);
      drawPredictions(predictions);
      // For predictive movement, track objects over time
      if (predictions.length > 0) {
        lastObjects = predictions;
      }
      // If OCR active, run OCR on a small region (where license plate might be)
      if (ocrActive && predictions.some(p => p.class === 'car' || p.class === 'truck')) {
        performOCR();
      }
    } catch(e) {
      console.warn("Detection error", e);
    }
    requestAnimationFrame(detectFrame);
  }

  function drawPredictions(predictions) {
    if (!canvasElement || !ctx) return;
    ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--neon').trim() || '#00f5c0';
    ctx.fillStyle = '#00f5c0';
    ctx.font = "16px 'Inter'";
    for (let pred of predictions) {
      const [x, y, w, h] = pred.bbox;
      ctx.strokeRect(x, y, w, h);
      ctx.fillText(`${pred.class} (${Math.round(pred.score*100)}%)`, x, y-5);
      // Draw predictive movement arrow (simple: assume constant velocity from last frame - for demo, just draw direction based on bbox change)
      // More advanced would need frame-to-frame tracking; here we just add a note.
    }
  }

  // ==================== License Plate OCR ====================
  async function performOCR() {
    if (!videoElement) return;
    // Capture a frame from video to canvas
    const offCanvas = document.createElement('canvas');
    offCanvas.width = videoElement.videoWidth;
    offCanvas.height = videoElement.videoHeight;
    const offCtx = offCanvas.getContext('2d');
    offCtx.drawImage(videoElement, 0, 0);
    const imageData = offCanvas.toDataURL();
    try {
      const { data: { text } } = await Tesseract.recognize(imageData, 'eng', { logger: m => console.log(m) });
      if (text && text.length > 0) {
        const plateRegex = /[A-Z0-9]{5,8}/i;
        const match = text.match(plateRegex);
        if (match) {
          const plate = match[0];
          // Lookup vehicle specs from a local mock database
          const vehicleSpecs = lookupVehicleByPlate(plate);
          document.getElementById("ocrResult").innerHTML = `📋 Plate: ${plate}<br>${vehicleSpecs}`;
        } else {
          document.getElementById("ocrResult").innerHTML = "No license plate detected.";
        }
      }
    } catch(e) {
      console.warn("OCR error", e);
    }
  }

  function lookupVehicleByPlate(plate) {
    // Mock database – in real use, could call an API.
    const mockSpecs = {
      "ABC123": "2020 Ford Mustang GT, 450hp, V8",
      "XYZ789": "2022 Tesla Model 3, 350hp, Electric",
      "DEF456": "2019 Chevrolet Silverado, 355hp, V6"
    };
    let spec = mockSpecs[plate.toUpperCase()];
    if (spec) return spec;
    else return "Unknown vehicle. Search online?";
  }

  // ==================== Snapshot ====================
  function takeSnapshot() {
    if (!videoElement) return;
    const offCanvas = document.createElement('canvas');
    offCanvas.width = videoElement.videoWidth;
    offCanvas.height = videoElement.videoHeight;
    const offCtx = offCanvas.getContext('2d');
    offCtx.drawImage(videoElement, 0, 0);
    const link = document.createElement('a');
    link.download = `snapshot_${Date.now()}.png`;
    link.href = offCanvas.toDataURL();
    link.click();
    // Optionally mint as NFT
    alert("Snapshot saved. You can mint this as an NFT in your profile.");
  }

  // ==================== Hunting Addon ====================
  function addHuntingLog(scat, track, marking) {
    huntingLogs.push({ scat, track, marking, date: new Date() });
    localStorage.setItem("huntingLogs", JSON.stringify(huntingLogs));
    // Award NFT for first log
    if (huntingLogs.length === 1) {
      userNFTs.push({ name: "Beginner Hunter Badge", value: "0.05 ETH" });
      localStorage.setItem("userNFTs", JSON.stringify(userNFTs));
      alert("🏅 You earned a Beginner Hunter NFT!");
    }
  }

  // ==================== Profile & Portfolio ====================
  function renderProfile(container) {
    let nftsHtml = userNFTs.map(n => `<div>${n.name} – ${n.value}</div>`).join('');
    let huntHtml = huntingLogs.map(l => `<div>Scat: ${l.scat}, Track: ${l.track}, Marking: ${l.marking}</div>`).join('');
    container.innerHTML = `
      <div class="card" style="text-align:center">
        <img src="${currentUser?.photoURL || 'https://via.placeholder.com/80'}" style="width:80px; border-radius:50%;">
        <h3>${currentUser?.displayName || "Guest"}</h3>
        <p>${currentUser?.email || "Not signed in"}</p>
        <p>Wallet: ${walletBalance.toFixed(2)} ETH</p>
        <button id="addFundsBtn">Add 1 ETH (demo)</button>
      </div>
      <div class="card">
        <h3>🏆 My NFTs</h3>
        ${nftsHtml || "No NFTs yet. Detect objects or hunt to earn."}
      </div>
      <div class="card">
        <h3>🏹 Hunting Logs</h3>
        ${huntHtml || "No logs yet. Use Hunt tab to add observations."}
      </div>
    `;
    document.getElementById("addFundsBtn")?.addEventListener("click", () => {
      walletBalance += 1;
      localStorage.setItem("walletBalance", walletBalance);
      renderProfile(container);
    });
  }

  // ==================== UI Rendering ====================
  function render() {
    const container = document.getElementById('screenContent');
    if (currentScreen === 'home') renderHome(container);
    else if (currentScreen === 'detect') renderDetect(container);
    else if (currentScreen === 'hunt') renderHunt(container);
    else if (currentScreen === 'profile') renderProfile(container);
    document.querySelectorAll('.nav-item').forEach(btn => {
      if(btn.dataset.nav === currentScreen) btn.classList.add('active');
      else btn.classList.remove('active');
    });
    updateUserWidget();
  }

  function renderHome(container) {
    container.innerHTML = `
      <div class="nft-banner">🔍 Real AI object detection. License plate OCR. Hunting analysis. All working locally.</div>
      <div class="card">
        <h3>Welcome to DaisyObjects</h3>
        <p>Use the <strong>Detect</strong> tab to point camera at objects – COCO-SSD will identify them.</p>
        <p>Click <strong>Hunt</strong> to log scat, tracks, and earn NFTs.</p>
        <p>Your portfolio syncs with SAYSO and other DaisyOS apps.</p>
      </div>
      <div class="nft-banner">💰 Every detection and hunt can mint an NFT. Trade on SAYSO marketplace!</div>
    `;
  }

  function renderDetect(container) {
    container.innerHTML = `
      <div class="card">
        <div id="modelStatus" class="badge">Loading AI model...</div>
        <div class="video-container">
          <video id="videoFeed" autoplay playsinline></video>
          <canvas id="detectionCanvas"></canvas>
        </div>
        <div class="controls">
          <button id="switchCamBtn">🔄 Switch Camera</button>
          <button id="nightVisionBtn">🌙 Night Vision</button>
          <button id="ocrBtn">🔍 License Plate OCR</button>
          <button id="snapshotBtn">📸 Snapshot</button>
        </div>
        <div id="ocrResult" class="badge" style="margin-top:12px;">OCR results will appear here.</div>
      </div>
      <div class="nft-banner">✨ Detected objects can be saved as NFTs. Click snapshot to capture.</div>
    `;
    videoElement = document.getElementById("videoFeed");
    canvasElement = document.getElementById("detectionCanvas");
    ctx = canvasElement.getContext("2d");
    startCamera().then(() => {
      if (!model) loadModel().then(() => {
        detectFrame();
      });
      else detectFrame();
    });
    document.getElementById("switchCamBtn")?.addEventListener("click", switchCamera);
    document.getElementById("nightVisionBtn")?.addEventListener("click", toggleNightVision);
    document.getElementById("ocrBtn")?.addEventListener("click", () => {
      ocrActive = !ocrActive;
      alert(ocrActive ? "OCR active. Point at license plate." : "OCR disabled");
    });
    document.getElementById("snapshotBtn")?.addEventListener("click", takeSnapshot);
  }

  function renderHunt(container) {
    container.innerHTML = `
      <div class="card">
        <h3>🏹 Hunting Addon</h3>
        <p>Log your findings – each entry may earn you an NFT.</p>
        <label>Scat analysis (type, freshness):</label>
        <input type="text" id="scatInput" placeholder="e.g., Deer, 2 days old"><br>
        <label>Track analysis (animal, size):</label>
        <input type="text" id="trackInput" placeholder="e.g., Hoof, 3 inches"><br>
        <label>Marking / rubs:</label>
        <input type="text" id="markingInput" placeholder="e.g., Antler rub on tree"><br>
        <button id="logHuntBtn">📝 Log Hunt Observation</button>
      </div>
      <div class="card">
        <h3>Previous Logs</h3>
        <div id="huntLogsList">${huntingLogs.map(l => `<div>🐾 ${l.scat} | ${l.track} | ${l.marking}</div>`).join('') || "No logs yet."}</div>
      </div>
      <div class="nft-banner">🏆 Leaderboard coming soon. Top hunters earn rare NFTs.</div>
    `;
    document.getElementById("logHuntBtn")?.addEventListener("click", () => {
      let scat = document.getElementById("scatInput").value;
      let track = document.getElementById("trackInput").value;
      let marking = document.getElementById("markingInput").value;
      if (scat || track || marking) {
        addHuntingLog(scat || "unknown", track || "unknown", marking || "none");
        renderHunt(container); // re-render to show new log
      } else {
        alert("Please fill at least one field.");
      }
    });
  }

  // ==================== User Authentication ====================
  function updateUserWidget() {
    const widget = document.getElementById('userWidget');
    if (currentUser) {
      widget.innerHTML = `<img src="${currentUser.photoURL || 'https://via.placeholder.com/32'}" style="width:32px; border-radius:50%;"> <span>${currentUser.displayName || currentUser.email}</span> <button id="logoutBtn" class="icon-btn" style="font-size:0.8rem;">🚪</button>`;
      document.getElementById('logoutBtn')?.addEventListener('click', () => {
        if(auth) auth.signOut();
        currentUser = null;
        localStorage.removeItem('daisyObjectsUser');
        render();
      });
    } else {
      widget.innerHTML = `<button id="googleSignInBtn" class="badge">🔑 Sign in with Google</button>`;
      document.getElementById('googleSignInBtn')?.addEventListener('click', () => {
        if (auth) {
          const provider = new firebase.auth.GoogleAuthProvider();
          auth.signInWithPopup(provider).then(result => {
            currentUser = result.user;
            localStorage.setItem('daisyObjectsUser', JSON.stringify({ displayName: currentUser.displayName, email: currentUser.email, photoURL: currentUser.photoURL }));
            render();
          }).catch(err => { alert("Fallback to mock admin"); mockSignIn(); });
        } else { mockSignIn(); }
      });
    }
  }
  function mockSignIn() {
    currentUser = { displayName: "Douglas Owens", email: "owensonicinfinity@gmail.com", photoURL: "https://via.placeholder.com/80" };
    localStorage.setItem('daisyObjectsUser', JSON.stringify(currentUser));
    render();
  }

  // ==================== Settings ====================
  function openSettings() {
    let modalHtml = `
      <div id="settingsModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); z-index:1000; display:flex; justify-content:center; align-items:center;">
        <div style="background:#1e293b; border-radius:32px; max-width:500px; width:90%; padding:24px; border:2px solid var(--neon);">
          <div style="display:flex; justify-content:space-between;"><h3>⚙️ Settings</h3><button id="closeSettingsBtn" style="background:none; border:none; font-size:1.8rem;">&times;</button></div>
          <div><label>Neon Color</label><input type="color" id="neonColorPicker" value="${localStorage.getItem('neonColor') || '#00f5c0'}" style="width:100%;"></div>
          <div><label>Background Image URL</label><input type="text" id="bgImageUrl" value="${customBgImage}" style="width:100%;"></div>
    `;
    if (isAdmin()) {
      modalHtml += `<div class="admin-section"><h4>🔐 Admin Controls</h4>
        <label>Gemini API Key</label><input type="password" id="geminiApiKeyInput" value="${geminiApiKey}" style="width:100%;">
        <button id="saveAdminSettings">Save Key</button>
        <p class="badge">Future AI analysis uses Gemini.</p></div>`;
    }
    modalHtml += `<button id="closeSettingsBtn2" style="margin-top:16px;">Close</button></div></div>`;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    document.getElementById('closeSettingsBtn')?.addEventListener('click', () => document.getElementById('settingsModal')?.remove());
    document.getElementById('closeSettingsBtn2')?.addEventListener('click', () => document.getElementById('settingsModal')?.remove());
    document.getElementById('neonColorPicker')?.addEventListener('change', (e) => {
      localStorage.setItem('neonColor', e.target.value);
      document.documentElement.style.setProperty('--neon', e.target.value);
    });
    document.getElementById('bgImageUrl')?.addEventListener('change', (e) => {
      customBgImage = e.target.value;
      localStorage.setItem('customBgImage', customBgImage);
      applyBackground();
    });
    if (isAdmin()) {
      document.getElementById('saveAdminSettings')?.addEventListener('click', () => {
        geminiApiKey = document.getElementById('geminiApiKeyInput').value;
        localStorage.setItem('geminiApiKey', geminiApiKey);
        alert("Gemini key saved.");
      });
    }
  }

  // ==================== Initialization ====================
  document.addEventListener('DOMContentLoaded', () => {
    const savedNeon = localStorage.getItem('neonColor');
    if (savedNeon) document.documentElement.style.setProperty('--neon', savedNeon);
    customBgImage = localStorage.getItem("customBgImage") || "";
    applyBackground();
    const storedUser = localStorage.getItem('daisyObjectsUser');
    if (storedUser) currentUser = JSON.parse(storedUser);
    render();
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        currentScreen = btn.dataset.nav;
        render();
        // Clean up video if leaving detect
        if (currentScreen !== 'detect' && videoStream) {
          videoStream.getTracks().forEach(track => track.stop());
          videoStream = null;
        }
      });
    });
    document.getElementById('settingsBtn')?.addEventListener('click', openSettings);
  });
</script>
</body>
</html>
